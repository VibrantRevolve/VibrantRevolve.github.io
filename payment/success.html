<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Payment Successful | VibrantRevolve</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">

<body>
  <div id="site-header"></div>

  <main class="container" style="min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 4rem 1.5rem;">
    <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
    <h1 style="color: var(--success); margin-bottom: 1rem;">Payment Successful!</h1>

    </p>

    <div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 2rem; max-width: 400px; width: 100%;">
      <p style="margin-bottom: 0.5rem;"><strong>Next Steps:</strong></p>
      <ul style="text-align: left; list-style: none; color: var(--text-secondary);">
        <li style="padding: 0.5rem 0;"><i class="fas fa-envelope" style="color: var(--accent); margin-right: 0.5rem;"></i> Check your email for confirmation</li>
        <li style="padding: 0.5rem 0;"><i class="fas fa-comments" style="color: var(--accent); margin-right: 0.5rem;"></i> I'll contact you within 24 hours</li>
        <li style="padding: 0.5rem 0;"><i class="fas fa-rocket" style="color: var(--accent); margin-right: 0.5rem;"></i> Project kickoff within 48 hours</li>
      </ul>
    </div>

    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
      <a href="/" class="btn btn-primary">
        <i class="fas fa-home" aria-hidden="true"></i> Back to Home
      </a>
      <a href="/services/" class="btn btn-secondary">
        <i class="fas fa-th-large" aria-hidden="true"></i> Explore Services
      </a>
    </div>
  </main>

  <div id="site-footer"></div>

</html>
